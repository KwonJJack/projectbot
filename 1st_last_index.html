<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TurtleBot3 AI Assistant</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

    <div class="container">

        <h1>🤖 TurtleBot3 AI Assistant</h1>

        <!-- ========================= -->
        <!-- Connection -->
        <!-- ========================= -->

        <div class="card">

            <h2>Connection</h2>

            <p id="connection">
                🔴 Disconnected
            </p>

        </div>

        <!-- ========================= -->
        <!-- Robot State -->
        <!-- ========================= -->

        <div class="card">

            <h2>Robot State</h2>

            <p id="robotState">

                IDLE

            </p>

        </div>

        <!-- ========================= -->
        <!-- Voice -->
        <!-- ========================= -->

        <div class="card">

            <h2>🎤 Voice Recognition</h2>

            <p id="voiceText">

                대기 중...

            </p>

        </div>

        <!-- ========================= -->
        <!-- AI -->
        <!-- ========================= -->

        <div class="card">

            <h2>💬 AI Response</h2>

            <p id="aiText">

                대기 중...

            </p>

        </div>

        <!-- ========================= -->
        <!-- Battery -->
        <!-- ========================= -->

        <div class="status-card">

            🔋 Battery :

            <span id="battery">--%</span>

        </div>

        <!-- ========================= -->
        <!-- Controller -->
        <!-- ========================= -->

        <div class="voice">
            <button id="recordBtn">🎤 음성 입력</button>
        </div>
        <div class="controller">

            <button id="forward">

                ▲

            </button>

            <div class="middle">

                <button id="left">

                    ◀

                </button>

                <button id="stop">

                    ■

                </button>

                <button id="right">

                    ▶

                </button>

            </div>

            <button id="backward">

                ▼

            </button>

        </div>

        <!-- ========================= -->
        <!-- Emergency -->
        <!-- ========================= -->

        <div class="emergency">

            <button id="emergency">

                🛑 Emergency Stop

            </button>

            <button id="release">

                ✅ Release Emergency

            </button>

        </div>

        <!-- ========================= -->
        <!-- Log -->
        <!-- ========================= -->

        <div class="card">

            <h2>Log</h2>

            <div id="logBox">

            </div>

        </div>

    </div>

    <script src="/static/script.js"></script>

</body>

</html>
